<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwik Payment Gateway</title>

    <!-- Icons & Manifest Configurations -->
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLeRTcvZ8b7OUiJTlp1oJX0DDMcT3qTHI7kZnr5Sdpww&s=10" title="Kwik PG v1.023">
    <link rel="apple-touch-icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLeRTcvZ8b7OUiJTlp1oJX0DDMcT3qTHI7kZnr5Sdpww&s=10">
    
    <!-- Mobile Progressive Web App Meta (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-title" content="Kwik Payment Gateway">
    <meta name="application-name" content="Kwik Payment Gateway">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- CSS & JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            /* Full cross-platform Segoe UI responsive font rendering stack */
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "SF Pro Text", SFUIDisplay, Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        /* Strict sharp edges across all UI elements */
        .sharp-edge {
            border-radius: 0px !important;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 sm:p-8 antialiased">

    <div class="bg-white border border-gray-200 sharp-edge shadow-sm max-w-xl w-full p-6 sm:p-8">
        
        <!-- Premium Core App Header -->
        <div class="flex items-center justify-between pb-6 border-b border-gray-200">
            <div class="flex items-center space-x-4">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLeRTcvZ8b7OUiJTlp1oJX0DDMcT3qTHI7kZnr5Sdpww&s=10" 
                     alt="Kwik Payment Gateway Logo" 
                     class="w-12 h-12 object-cover border border-gray-200 sharp-edge">
                <div>
                    <h1 class="text-xl font-semibold text-slate-900 tracking-tight uppercase">Kwik Payment Gateway</h1>
                    <p class="text-xs text-slate-500 tracking-wider">Enterprise Invoicing Operations Platform</p>
                </div>
            </div>
            <span class="text-[10px] font-mono font-bold bg-slate-100 border border-slate-200 text-slate-700 px-2 py-0.5 sharp-edge">v1.023</span>
        </div>

        <!-- Dynamic Processing Input Fields -->
        <div class="mt-6 space-y-6">
            
            <!-- Section 1: Beneficiary Information -->
            <div>
                <div class="flex items-center space-x-2 pb-2 border-b border-gray-100 text-xs font-bold text-slate-800 uppercase tracking-wider">
                    <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span>1. Beneficiary Settlement Destination</span>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">UPI ID (VPA) *</label>
                        <input type="text" id="upiIdInput" placeholder="merchant@bank" 
                               class="block w-full px-3 py-2 bg-white border border-gray-300 sharp-edge focus:outline-none focus:border-slate-900 focus:ring-1 focus:ring-slate-900 text-sm transition-all text-slate-900 placeholder-gray-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">Business Name *</label>
                        <input type="text" id="businessNameInput" placeholder="Legal Settlement Title" 
                               class="block w-full px-3 py-2 bg-white border border-gray-300 sharp-edge focus:outline-none focus:border-slate-900 focus:ring-1 focus:ring-slate-900 text-sm transition-all text-slate-900 placeholder-gray-400">
                    </div>
                </div>
            </div>

            <!-- Section 2: Financial Matrix Setup -->
            <div>
                <div class="flex items-center space-x-2 pb-2 border-b border-gray-100 text-xs font-bold text-slate-800 uppercase tracking-wider">
                    <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    <span>2. Financial Ledger Parameters</span>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">Requested Amount (INR) *</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500 text-sm font-semibold">₹</span>
                            <input type="number" id="amountInput" placeholder="0.00" min="0.01" step="any"
                                   class="block w-full pl-7 pr-3 py-2 bg-white border border-gray-300 sharp-edge focus:outline-none focus:border-slate-900 focus:ring-1 focus:ring-slate-900 font-bold text-sm text-slate-900 placeholder-gray-400">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">Payment Remark / Note <span class="text-slate-400 lowercase"></span></label>
                        <input type="text" id="noteInput" placeholder="Invoice or transaction description" 
                               class="block w-full px-3 py-2 bg-white border border-gray-300 sharp-edge focus:outline-none focus:border-slate-900 focus:ring-1 focus:ring-slate-900 text-sm transition-all text-slate-900 placeholder-gray-400">
                    </div>
                </div>
            </div>

        </div>

        <!-- Execution Panel Trigger Component -->
        <button onclick="generateKwikQR()" 
                class="mt-6 w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-4 sharp-edge transition-all text-xs uppercase tracking-widest cursor-pointer text-center block">
            Compile Gateway Token
        </button>

        <!-- Output Gateway Matrix Node Window -->
        <div id="qrWrapper" class="hidden mt-6 pt-6 border-t border-gray-200 flex flex-col items-center">
            
            <!-- Context Statement Terminal Block -->
            <div class="w-full bg-slate-50 border border-gray-200 p-4 mb-6">
                <span class="text-[10px] font-mono font-bold tracking-widest text-slate-400 block uppercase">Generated Terminal Payload</span>
                <div class="flex justify-between items-baseline mt-2">
                    <p id="displayBizName" class="font-bold text-slate-900 text-sm truncate mr-4"></p>
                    <p id="displayAmount" class="text-lg font-black text-slate-900 whitespace-nowrap"></p>
                </div>
            </div>

            <!-- Sharp Balanced QR Array Rendering Box -->
            <div class="p-3 bg-white border border-gray-200 sharp-edge mb-6">
                <div id="qrcode"></div>
            </div>
            
            <!-- Quick Action Interactive Triggers -->
            <div class="grid grid-cols-2 gap-4 w-full">
                <!-- Action 1: Copy Shared Link -->
                <button onclick="copyPaymentLink()" id="copyBtn" class="inline-flex items-center justify-center space-x-2 bg-white hover:bg-slate-50 text-slate-900 font-bold py-2.5 px-4 sharp-edge border border-slate-300 text-xs uppercase tracking-wider transition-all cursor-pointer">
                    <svg class="w-4 h-4 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    <span id="copyBtnText">Copy Link</span>
                </button>
                
                <!-- Action 2: Deep Link App Execution Button -->
                <a id="mobileUpiBtn" href="#" class="inline-flex items-center justify-center space-x-2 bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 px-4 sharp-edge text-xs uppercase tracking-wider transition-all text-center">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    <span>Launch App</span>
                </a>
            </div>

            <div class="mt-5 flex items-center space-x-2 text-[10px] text-slate-400 font-semibold tracking-wider uppercase">
                <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                <span>Structured Encryption Payload Compliant</span>
            </div>
        </div>

    </div>

    <!-- Core App Logic Engine -->
    <script>
        let qrcodeBox = document.getElementById("qrcode");
        let activePayloadStr = "";

        function generateKwikQR() {
            // Collecting Required Input Streams
            const upiId = document.getElementById("upiIdInput").value.trim();
            const rawBizName = document.getElementById("businessNameInput").value.trim();
            const amount = document.getElementById("amountInput").value.trim();
            const note = document.getElementById("noteInput").value.trim();

            // DOM UI References
            const qrWrapper = document.getElementById("qrWrapper");
            const displayBizName = document.getElementById("displayBizName");
            const displayAmount = document.getElementById("displayAmount");
            const mobileUpiBtn = document.getElementById("mobileUpiBtn");
            const copyBtnText = document.getElementById("copyBtnText");

            // Form Validation Protocol
            if (!upiId || !upiId.includes('@')) {
                alert("Routing aborted: Enter a valid VPA (UPI ID).");
                return;
            }
            if (!rawBizName) {
                alert("Routing aborted: Corporate registered business name missing.");
                return;
            }
            if (!amount || parseFloat(amount) <= 0) {
                alert("Routing aborted: Specified asset amount must exceed 0.00.");
                return;
            }

            // GPay Fixed Mapping Optimization: Display remark clearly appended to title parameters
            const configuredTitle = note ? `${rawBizName} (${note})` : rawBizName;
            
            const safeBizName = encodeURIComponent(configuredTitle);
            const safeNote = note ? encodeURIComponent(note) : "Kwik Gateway Checkout";

            // Initialize structural URI payload framework
            activePayloadStr = `upi://pay?pa=${upiId}&pn=${safeBizName}&am=${amount}&tn=${safeNote}&cu=INR`;

            // Resetting UI targets
            qrcodeBox.innerHTML = "";
            copyBtnText.innerText = "Copy Link";

            // Drawing precise binary vector matrix 
            new QRCode(qrcodeBox, {
                text: activePayloadStr,
                width: 175,
                height: 175,
                colorDark: "#0f172a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });

            // Publishing layout details to human-readable views
            displayBizName.innerText = configuredTitle;
            displayAmount.innerText = `₹${parseFloat(amount).toLocaleString('en-IN', { minimumFractionDigits: 2 })}`;
            mobileUpiBtn.href = activePayloadStr;

            // Interface Reveal
            qrWrapper.classList.remove("hidden");
            qrWrapper.scrollIntoView({ behavior: 'smooth' });
        }

        function copyPaymentLink() {
            if (!activePayloadStr) return;
            const copyBtnText = document.getElementById("copyBtnText");
            
            navigator.clipboard.writeText(activePayloadStr).then(() => {
                copyBtnText.innerText = "Copied";
                setTimeout(() => { copyBtnText.innerText = "Copy Link"; }, 2000);
            }).catch(err => {
                // System fallback manual highlight mechanism
                const fallbackInput = document.createElement("input");
                fallbackInput.value = activePayloadStr;
                document.body.appendChild(fallbackInput);
                fallbackInput.select();
                document.execCommand("copy");
                document.body.removeChild(fallbackInput);
                copyBtnText.innerText = "Copied";
                setTimeout(() => { copyBtnText.innerText = "Copy Link"; }, 2000);
            });
        }
    </script>
</body>
</html>
